<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi - BOITIER TRUMA</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #333; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 18px; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #resultat { margin-top: 30px; text-align: left; display: none; }
        .info-box { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 20px; }
        .status-badge { display: inline-block; padding: 5px 15px; background: #e7f3ff; color: var(--primary-color); border-radius: 20px; font-weight: bold; }
        #loader { display: none; margin-top: 15px; color: #666; }
    </style>
</head>
<body>
<div class="card">
    <div style="font-size: 24px; font-weight: bold; color: #007bff; margin-bottom: 10px;">BOITIER TRUMA</div>
    <h2>Suivi de dossier</h2>
    <input type="text" id="searchId" placeholder="Ex: TR-VZFZ8">
    <button onclick="rechercher()">Consulter le statut</button>
    <div id="loader">Chargement...</div>
    <div id="resultat">
        <div class="info-box">
            <p><strong>Client:</strong> <span id="res-nom"></span></p>
            <p><strong>Mise à jour:</strong> <span id="res-date"></span></p>
            <p><strong>État:</strong> <span class="status-badge" id="res-statut"></span></p>
            <p><strong>Détails:</strong> <span id="res-comm"></span></p>
        </div>
    </div>
    <div id="error-msg" style="color: #dc3545; margin-top: 15px;"></div>
</div>

<script>
    function rechercher() {
        const searchVal = document.getElementById('searchId').value.trim().toUpperCase();
        const resDiv = document.getElementById('resultat');
        const errMsg = document.getElementById('error-msg');
        const loader = document.getElementById('loader');
        const url = "https://script.google.com/macros/s/AKfycbynglkA18JDsMI3kRzl8A5i0ZP17aKNcJwXWklatFZrMS4Ewi2JoKXfO9aZZPBkNOad4w/exec";

        if(!searchVal) return;

        loader.style.display = "block";
        resDiv.style.display = "none";
        errMsg.innerText = "";

        fetch(url)
            .then(res => res.json())
            .then(data => {
                loader.style.display = "none";
                const ligne = data.find(row => row.idclient && row.idclient.toString().toUpperCase() === searchVal);
                if(ligne) {
                    document.getElementById('res-nom').innerText = ligne.nom || "-";
                    document.getElementById('res-date').innerText = (ligne.date || "-").split('T')[0];
                    document.getElementById('res-statut').innerText = (ligne.status || "En attente").toUpperCase();
                    document.getElementById('res-comm').innerText = ligne.statustexte || "-";
                    resDiv.style.display = "block";
                } else {
                    errMsg.innerText = "Code introuvable.";
                }
            })
            .catch(err => {
                loader.style.display = "none";
                errMsg.innerText = "Erreur de connexion.";
            });
    }
</script>
</body>
</html>
